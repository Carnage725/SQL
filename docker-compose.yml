services:
  db:
    image: postgres:16
    container_name: pg_learn
    restart: always
    environment:
      POSTGRES_USER: learner
      POSTGRES_PASSWORD: learn123
      POSTGRES_DB: sql_practice
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: